<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ideiabh Convites — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-l:#e8c96d;
  --bg:#0d0d1a;--card:#16162a;--card2:#0a0a14;
  --border:#252542;--text:#e2e2f0;--muted:#7070a0;
  --wa:#25d366;--danger:#ef4444;--success:#10b981;--info:#3b82f6;
  --col-body:rgba(8,8,18,.5);--card-hover:#1c1c36;--card-hb:#3a3a60;
}
body.light{
  --bg:#f2f2f7;--card:#ffffff;--card2:#e8e8f0;
  --border:#d0d0e0;--text:#1a1a2e;--muted:#7070a0;
  --col-body:rgba(210,210,235,.45);--card-hover:#f8f8ff;--card-hb:#a0a0cc;
}
body.light select option{background:#fff}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
.logo-text{font-family:'Cinzel',serif;color:var(--gold)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;
  border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold)}
.btn-gold{background:var(--gold);color:#000;border:none}.btn-gold:hover{background:var(--gold-l)}
.btn-wa{background:#0d2216;color:var(--wa);border:1px solid #1a3d25;font-size:12px;padding:4px 10px}
.btn-wa:hover{border-color:var(--wa)}
body.light .btn-wa{background:#e6faf0;color:#0a7a3e;border-color:#9fe0be}
.btn-danger{background:#2a0d0d;color:var(--danger);border-color:#3d1414}
body.light .btn-danger{background:#fde8e8;color:#b91c1c;border-color:#fca5a5}
.btn-danger:hover{border-color:var(--danger)}
.btn-info{background:#0d1a2a;color:var(--info);border-color:#1a3d5a}
body.light .btn-info{background:#e8f0fe;color:#1a56db;border-color:#93c5fd}
.theme-btn{padding:7px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;line-height:1}
.theme-btn:hover{border-color:var(--gold)}
input,select,textarea{background:var(--card2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:14px;
  width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:72px}
label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
select option{background:var(--card2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:650px;max-height:92vh;overflow-y:auto}
.modal-sm{max-width:440px}.modal-xs{max-width:380px}
#hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.tab{padding:6px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;transition:all .2s;background:transparent;color:var(--muted)}
.tab.on{background:var(--gold);color:#000}
#kanban{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;padding:16px;min-height:calc(100vh - 67px);align-items:flex-start}
@media(max-width:1100px){#kanban{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:700px){#kanban{grid-template-columns:repeat(2,minmax(0,1fr))}}
.col{width:100%;display:flex;flex-direction:column;min-width:0}
.col-head{background:var(--card);border:1px solid var(--border);border-bottom:none;border-radius:12px 12px 0 0;padding:12px 14px;display:flex;align-items:center;gap:8px}
.col-body{background:var(--col-body);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;flex:1;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:180px}
.card{background:var(--card);border:1px solid var(--border);border-left-width:3px;border-radius:10px;padding:13px;cursor:pointer;transition:all .15s}
.card:hover{transform:translateY(-2px);background:var(--card-hover);border-color:var(--card-hb)}
.badge{display:inline-block;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:26px}
.kcard{background:var(--card);border:1px solid var(--border);border-top:3px solid;border-radius:12px;padding:18px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative}
.scard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 12px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text);font-size:13px;font-weight:700;text-align:center;border-top-width:3px}
.scard:hover{transform:translateY(-5px)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800}
.sec{color:var(--text);font-size:15px;font-weight:700;margin-bottom:14px}
.info-l{color:var(--muted);font-size:12px;margin-bottom:2px}
.info-v{color:var(--text);font-size:14px;font-weight:600;padding:4px 0}
.nitem{background:var(--card2);border-radius:8px;padding:10px 14px;border:1px solid var(--border)}
hr{border:none;border-top:1px solid var(--border)}
.pill{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid;font-family:'Nunito',sans-serif}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--muted);font-weight:600;padding:10px 14px;text-align:left;background:var(--card2)}
td{padding:10px 14px;border-top:1px solid var(--border)}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:700;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#loading{position:fixed;inset:0;background:var(--bg);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.dl-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.rtable th,.rtable td{font-size:12px;padding:8px 12px;white-space:nowrap}
/* TASK BADGE */
.task-notif{background:var(--danger);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;vertical-align:middle;animation:pulse 1.5s infinite}
.task-type-fu{border-left:3px solid #f59e0b}
.task-type-pr{border-left:3px solid #3b82f6}
.task-type-cl{border-left:3px solid #10b981}
.task-type-ou{border-left:3px solid #8b5cf6}
.titem{background:var(--card2);border-radius:10px;padding:12px 14px;border:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.titem.done{opacity:.5}
.titem.overdue .tdue{color:var(--danger)!important;font-weight:700}
.tdue{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div id="loading">
  <img src="https://www.ideiabh.com.br/2018/images/ideia-web-logo.png" style="height:48px;object-fit:contain;margin-bottom:8px" onerror="this.style.display='none'">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:13px">Carregando o CRM Ideiabh...</div>
</div>
<div id="toast"></div>
<div id="app"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import{getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,deleteDoc,serverTimestamp,query,orderBy,where}
  from'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const fbCfg={apiKey:"AIzaSyCbjFYUcZXq8-Joc-KFPR3s31pyU0Oe1nU",authDomain:"crm-ideiabh.firebaseapp.com",
  projectId:"crm-ideiabh",storageBucket:"crm-ideiabh.firebasestorage.app",
  messagingSenderId:"620180155427",appId:"1:620180155427:web:ec756b8874b9d4ff30d596"};
const fbApp=initializeApp(fbCfg);
const db=getFirestore(fbApp);

const STAGES=[
  {id:'lead',label:'Novo Lead',icon:'🎯',color:'#6366f1'},
  {id:'contato',label:'Em Contato',icon:'📞',color:'#f59e0b'},
  {id:'proposta',label:'Proposta',icon:'📄',color:'#3b82f6'},
  {id:'negociacao',label:'Negociação',icon:'🤝',color:'#8b5cf6'},
  {id:'fechado',label:'Fechado',icon:'🎓',color:'#10b981'},
  {id:'perdido',label:'Perdido',icon:'💔',color:'#ef4444'},
];
const TASK_TYPES=[
  {id:'followup',label:'Follow Up',icon:'🔁',color:'#f59e0b',cls:'task-type-fu'},
  {id:'proposta',label:'Envio de Proposta/Material',icon:'📤',color:'#3b82f6',cls:'task-type-pr'},
  {id:'call',label:'Call / Tirar Dúvidas',icon:'📞',color:'#10b981',cls:'task-type-cl'},
  {id:'outro',label:'Outro',icon:'📌',color:'#8b5cf6',cls:'task-type-ou'},
];
const AV=['#c9a84c','#6366f1','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#ec4899'];
const ORIGENS=[
  {id:'campanha',label:'Campanha',icon:'📢',color:'#6366f1'},
  {id:'indicacao',label:'Indicação Turma',icon:'🤝',color:'#10b981'},
  {id:'parceiro',label:'Parceiros',icon:'🏢',color:'#f59e0b'},
  {id:'organico',label:'Orgânico',icon:'🌱',color:'#3b82f6'},
  {id:'outro',label:'Outro',icon:'📌',color:'#8b5cf6'},
];
const LOGO='https://www.ideiabh.com.br/2018/images/ideia-web-logo.png';

let S={
  user:null,isAdmin:false,leads:[],tasks:[],
  sellers:['Ana Silva','Bruno Costa','Carlos Lima','Diana Santos','Eduardo Ramos','Fernanda Souza','Gabriel Alves','Helena Martins'],
  sellerPasses:{},
  adminName:'Administrador',adminPass:'ideiabh2025',
  view:'kanban',sid:null,showAdd:false,showSet:false,showTaskModal:false,showNotif:false,
  taskLid:null,editTask:null,
  filter:'all',edit:false,
  theme:localStorage.getItem('ideiabh-theme')||'dark',
  rptStage:'all',rptSeller:'all',rptOrigin:'all',
  waTemplates:{
    lead:'Olá {nome}! 😊 Vi que você tem interesse em convites de formatura. Somos a Ideiabh, especialistas nisso! Posso te apresentar nossos modelos?',
    contato:'Oi {nome}! Tudo bem? Só passando para dar continuidade ao nosso contato sobre os convites de formatura. Tem alguma dúvida que posso te ajudar?',
    proposta:'Olá {nome}! 🎓 Conforme conversamos, segue nossa proposta para os convites de formatura. Fico à disposição para qualquer ajuste!',
    negociacao:'Oi {nome}! Estamos quase lá! 🤝 Queria entender melhor o que posso fazer para fechar o melhor negócio para você. Podemos conversar?',
    fechado:'Parabéns {nome}! 🎉 Muito feliz em poder fazer parte da sua conquista! Em breve entraremos em contato com os próximos passos do seu pedido.',
    perdido:'Olá {nome}, tudo bem? Entendo que o momento pode não ter sido o ideal. Se precisar de convites no futuro, pode contar com a Ideiabh! 💙',
  },
  quickReplies:[
    'Olá! Ainda tem interesse nos convites?',
    'Posso te enviar o catálogo completo agora?',
    'Que tal agendar uma conversa rápida?',
    'Já definiu a data da formatura?',
    'Consigo um desconto especial para você hoje!',
  ],
  goals:{},
  showWaModal:false,waModalLead:null,waModalStage:null,showGoals:false,
  unsubLeads:null,unsubTasks:null
};
window.S=S;

function applyTheme(){document.body.classList.toggle('light',S.theme==='light');localStorage.setItem('ideiabh-theme',S.theme)}
applyTheme();

/* ── CONFIG ── */
async function loadConfig(){
  try{onSnapshot(doc(db,'config','settings'),snap=>{
    if(snap.exists()){const d=snap.data();if(d.sellers)S.sellers=d.sellers;if(d.adminName)S.adminName=d.adminName;if(d.adminPass)S.adminPass=d.adminPass;if(d.sellerPasses)S.sellerPasses=d.sellerPasses;if(d.waTemplates)S.waTemplates=d.waTemplates;if(d.quickReplies)S.quickReplies=d.quickReplies;if(d.goals)S.goals=d.goals;}
    if(S.user)R();
  });}catch(e){}
}
async function saveConfig(){
  const data={sellers:S.sellers,sellerPasses:S.sellerPasses,adminName:S.adminName,adminPass:S.adminPass,waTemplates:S.waTemplates,quickReplies:S.quickReplies,goals:S.goals};
  try{await updateDoc(doc(db,'config','settings'),data);}
  catch(e){try{const{setDoc}=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');await setDoc(doc(db,'config','settings'),data);}catch(e2){}}
}

/* ── REALTIME ── */
function subscribeLeads(){
  if(S.unsubLeads)S.unsubLeads();
  S.unsubLeads=onSnapshot(query(collection(db,'leads'),orderBy('createdAt','desc')),
    snap=>{S.leads=snap.docs.map(d=>({id:d.id,...d.data()}));if(!S.showAdd&&!S.showTaskModal&&!S.showSet&&!S.editTask&&!S.edit)R();},
    ()=>toast('⚠️ Erro ao carregar leads',true));
}
function subscribeTasks(){
  if(S.unsubTasks)S.unsubTasks();
  S.unsubTasks=onSnapshot(query(collection(db,'tasks'),orderBy('dueDate','asc')),
    snap=>{S.tasks=snap.docs.map(d=>({id:d.id,...d.data()}));if(!S.showAdd&&!S.showTaskModal&&!S.showSet&&!S.editTask&&!S.edit)R();},
    ()=>toast('⚠️ Erro ao carregar tarefas',true));
}

/* ── UTILS ── */
function fmtR(v){if(!v&&v!==0)return'—';return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(d){if(!d)return'—';const[y,m,dy]=d.split('-');return`${dy}/${m}/${y}`}
function ago(iso){if(!iso)return'agora';const d=Math.floor((Date.now()-new Date(iso))/86400000);return d===0?'hoje':d===1?'ontem':`${d}d atrás`}
function isoOf(ts){return ts?.toDate?ts.toDate().toISOString():ts||''}
function wlink(ph,nm){const c=ph.replace(/\D/g,'');const n=c.startsWith('55')?c:'55'+c;return`https://wa.me/${n}?text=${encodeURIComponent(`Olá ${nm}! 😊 Somos especializados em convites de formatura. Posso apresentar nossos modelos?`)}`}
function stg(id){return STAGES.find(s=>s.id===id)||STAGES[0]}
function ttype(id){return TASK_TYPES.find(t=>t.id===id)||TASK_TYPES[0]}
function lead(id){return S.leads.find(l=>l.id===id)}
function avc(s){const i=S.sellers.indexOf(s);return AV[i>=0?i%8:0]}
function toast(msg,err=false){const el=document.createElement('div');el.className='toast';el.textContent=msg;el.style.borderColor=err?'var(--danger)':'var(--gold)';document.getElementById('toast').appendChild(el);setTimeout(()=>el.remove(),3000)}
function myPendingTasks(){if(!S.user)return[];return S.tasks.filter(t=>t.assignedTo===S.user&&t.status!=='done')}
function isOverdue(t){return t.dueDate&&new Date(t.dueDate+'T23:59:59')<new Date()&&t.status!=='done'}
function daysUntil(dueDate){
  if(!dueDate)return null;
  const diff=Math.ceil((new Date(dueDate+'T23:59:59')-new Date())/(1000*60*60*24));
  return diff;
}
function dueBadge(t){
  if(!t.dueDate||t.status==='done')return'';
  const d=daysUntil(t.dueDate);
  if(d<0)return`<span class="badge" style="background:#ef444422;color:#ef4444;font-size:10px">⚠️ ${Math.abs(d)}d atrasada</span>`;
  if(d===0)return`<span class="badge" style="background:#f59e0b22;color:#f59e0b;font-size:10px">⏰ Vence hoje</span>`;
  if(d<=3)return`<span class="badge" style="background:#f59e0b22;color:#f59e0b;font-size:10px">⏳ ${d}d restante${d>1?'s':''}</span>`;
  return`<span class="badge" style="background:var(--card2);color:var(--muted);font-size:10px">📅 ${d}d restantes</span>`;
}

/* ── RENDER ── */
window.R=function R(){applyTheme();if(S.sid&&!lead(S.sid)){S.sid=null;S.edit=false;}document.getElementById('app').innerHTML=!S.user?loginHTML():appHTML()}

/* ── LOGIN ── */
function loginHTML(){
  const cards=S.sellers.map((s,i)=>{
    const safe=s.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return`
    <button class="scard" onclick="doLogin('${safe}')" style="border-top-color:${AV[i%8]}">
      <div class="av" style="width:52px;height:52px;font-size:20px;background:${AV[i%8]}22;border:2px solid ${AV[i%8]};color:${AV[i%8]}">${s.charAt(0)}</div>
      <span>${s}</span></button>`;
  }).join('');
  return`<div id="login">
    <div style="position:absolute;top:18px;right:18px"><button class="theme-btn" onclick="toggleTheme()" title="${S.theme==='dark'?'Modo claro':'Modo escuro'}">${S.theme==='dark'?'☀️':'🌙'}</button></div>
    <div style="text-align:center;margin-bottom:36px">
      <img src="${LOGO}" style="height:56px;object-fit:contain;margin-bottom:14px" onerror="this.outerHTML='<div class=logo-text style=font-size:36px>🎓 Ideiabh</div>'">
      <div style="color:var(--muted);font-size:11px;letter-spacing:4px;text-transform:uppercase;margin-top:6px">CRM Interno</div>
      <div style="margin-top:10px;color:var(--success);font-size:12px"><span class="online-dot"></span>Conectado em tempo real</div>
    </div>
    <div style="color:var(--text);font-size:18px;font-weight:700;text-align:center;margin-bottom:22px">Quem está acessando?</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:580px;width:100%">${cards}</div>
    <div style="margin-top:18px;max-width:580px;width:100%">
      <button class="scard" onclick="doAdminLogin()" style="border-top-color:var(--gold);width:200px;margin:0 auto">
        <div class="av" style="width:52px;height:52px;font-size:22px;background:#c9a84c22;border:2px solid var(--gold);color:var(--gold)">🛡️</div>
        <span style="color:var(--gold)">${S.adminName}</span>
        <span style="color:var(--muted);font-size:11px;font-weight:400">Acesso com senha</span>
      </button>
    </div>
  </div>`
}

/* ── APP ── */
function appHTML(){
  const u=S.user,color=avc(u);
  const pendTasks=myPendingTasks();
  const overdueCnt=pendTasks.filter(isOverdue).length;
  const fOpts=S.sellers.map(s=>`<option value="${s}" ${S.filter===s?'selected':''}>${s}</option>`).join('');
  const taskBadge=pendTasks.length?`<span class="task-notif">${pendTasks.length}</span>`:'';
  const hdr=`<div id="hdr">
    <img src="${LOGO}" style="height:36px;object-fit:contain;flex-shrink:0" onerror="this.outerHTML='<div class=logo-text style=font-size:18px>🎓 Ideiabh</div>'">
    <div style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="tab ${S.view==='kanban'?'on':''}" onclick="setView('kanban')">📋 Kanban</button>
      <button class="tab ${S.view==='tarefas'?'on':''}" onclick="setView('tarefas')">✅ Tarefas${taskBadge}</button>
      <button class="tab ${S.view==='dashboard'?'on':''}" onclick="setView('dashboard')">📊 Dashboard</button>
      <button class="tab ${S.view==='relatorios'?'on':''}" onclick="setView('relatorios')">📥 Relatórios</button>
    </div>
    ${S.isAdmin&&S.view!=='relatorios'&&S.view!=='tarefas'?`<select style="max-width:170px;flex-shrink:0" onchange="setFilter(this.value)">
      <option value="all" ${S.filter==='all'?'selected':''}>Todos os vendedores</option>${fOpts}
    </select>`:''}
    <div style="margin-left:auto;color:var(--success);font-size:12px;white-space:nowrap"><span class="online-dot"></span>Ao vivo</div>
    <button class="btn btn-gold" onclick="openAdd()">+ Novo Lead</button>
    <button class="theme-btn" onclick="toggleTheme()">${S.theme==='dark'?'☀️':'🌙'}</button>
    <button class="btn" onclick="openSet()" style="padding:7px 12px">⚙️</button>

/* ── DASHBOARD ── */
function dashHTML(){
  const ls=S.isAdmin?S.leads:S.leads.filter(l=>l.assignedTo===S.user);
  const fch=ls.filter(l=>l.stage==='fechado'),prd=ls.filter(l=>l.stage==='perdido');
  const pip=ls.filter(l=>!['fechado','perdido'].includes(l.stage));
  const rev=fch.reduce((s,l)=>s+(Number(l.value)||0),0);
  const pot=pip.reduce((s,l)=>s+(Number(l.value)||0),0);
  const conv=ls.length?((fch.length/ls.length)*100).toFixed(1):'0.0';
  const pTasks=S.tasks.filter(t=>t.status!=='done');
  const kpis=[
    {icon:'🎯',lbl:'Total de Leads',v:ls.length,c:'#6366f1'},{icon:'⚡',lbl:'Em Pipeline',v:pip.length,c:'#f59e0b'},
    {icon:'🎓',lbl:'Fechados',v:fch.length,c:'#10b981'},{icon:'💔',lbl:'Perdidos',v:prd.length,c:'#ef4444'},
    {icon:'📈',lbl:'Taxa de Conversão',v:conv+'%',c:'#c9a84c'},{icon:'💰',lbl:'Receita Fechada',v:fmtR(rev),c:'#10b981'},
    {icon:'🚀',lbl:'Potencial Pipeline',v:fmtR(pot),c:'#3b82f6'},{icon:'✅',lbl:'Tarefas Pendentes',v:pTasks.length,c:'#f59e0b'},
  ].map(k=>`<div class="kcard" style="border-top-color:${k.c}"><div style="font-size:22px;margin-bottom:8px">${k.icon}</div><div style="color:${k.c};font-size:22px;font-weight:800">${k.v}</div><div style="color:var(--muted);font-size:12px;margin-top:4px">${k.lbl}</div></div>`).join('');
  const rows=S.sellers.map((sel,i)=>{
    const sl=ls.filter(l=>l.assignedTo===sel),sf=sl.filter(l=>l.stage==='fechado');
    const sp=sl.filter(l=>!['fechado','perdido'].includes(l.stage));
    const rv=sf.reduce((s,l)=>s+(Number(l.value)||0),0);
    const c=sl.length?((sf.length/sl.length)*100).toFixed(0):'0';
    const pt=S.tasks.filter(t=>t.assignedTo===sel&&t.status!=='done').length;
    return`<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="av" style="width:28px;height:28px;min-width:28px;font-size:12px;background:${AV[i%8]}22;border:1px solid ${AV[i%8]};color:${AV[i%8]}">${sel.charAt(0)}</div><span style="font-weight:700">${sel}</span></div></td><td style="text-align:center">${sl.length}</td><td style="text-align:center;color:#f59e0b">${sp.length}</td><td style="text-align:center;color:#10b981">${sf.length}</td><td style="text-align:center;color:var(--gold)">${c}%</td><td style="text-align:center;color:#f59e0b">${pt||'—'}</td><td style="text-align:right;color:var(--gold);font-weight:700">${rv>0?fmtR(rv):'—'}</td></tr>`;
  }).join('');
  return`<div style="padding:24px;max-width:1200px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <img src="${LOGO}" style="height:30px;object-fit:contain" onerror="this.style.display='none'">
      <div style="font-family:Cinzel,serif;color:var(--gold);font-size:20px">Dashboard</div>
    </div>
    <div class="kgrid">${kpis}</div>
    ${S.isAdmin?`<div class="rcard"><div style="padding:16px 20px;border-bottom:1px solid var(--border)"><div class="sec" style="margin:0">Performance por Vendedor</div></div>
      <div style="overflow-x:auto"><table><thead><tr><th>Vendedor</th><th style="text-align:center">Total</th><th style="text-align:center">Pipeline</th><th style="text-align:center">Fechados</th><th style="text-align:center">Conversão</th><th style="text-align:center">Tarefas</th><th style="text-align:right">Receita</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>`:''}
    <div class="rcard" style="margin-top:20px">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div class="sec" style="margin:0">🎯 Meta Mensal de Fechamentos</div>
        ${S.isAdmin?`<button class="btn" style="font-size:12px;padding:5px 12px" onclick="S.showGoals=true;R()">✏️ Definir Metas</button>`:''}
      </div>
      <div style="padding:16px 20px;display:flex;flex-direction:column;gap:14px">
        ${(S.isAdmin?S.sellers:[S.user]).map((sel,i)=>{
          const i2=S.sellers.indexOf(sel);
          const goal=parseInt(S.goals[sel])||0;
          const month=new Date().getMonth(),year=new Date().getFullYear();
          const done=S.leads.filter(l=>l.assignedTo===sel&&l.stage==='fechado'&&isoOf(l.updatedAt)&&new Date(isoOf(l.updatedAt)).getMonth()===month&&new Date(isoOf(l.updatedAt)).getFullYear()===year).length;
          const pct=goal?Math.min(100,Math.round((done/goal)*100)):0;
          const bar=goal?`<div style="height:8px;border-radius:4px;background:var(--card2);overflow:hidden;flex:1">
            <div style="height:100%;width:${pct}%;background:${pct>=100?'var(--success)':pct>=60?'var(--gold)':'var(--info)'};border-radius:4px;transition:width .4s"></div>
          </div>`:'<div style="flex:1;color:var(--muted);font-size:11px">Sem meta definida</div>';
          return`<div style="display:flex;align-items:center;gap:10px">
            <div class="av" style="width:28px;height:28px;min-width:28px;font-size:12px;background:${AV[i2%8]}22;border:1px solid ${AV[i2%8]};color:${AV[i2%8]}">${sel.charAt(0)}</div>
            <div style="min-width:100px;font-size:13px;font-weight:700">${sel.split(' ')[0]}</div>
            ${bar}
            <div style="font-size:12px;font-weight:700;min-width:60px;text-align:right;color:${pct>=100?'var(--success)':'var(--text)'}">${done}${goal?' / '+goal:''} ${pct>=100?'🏆':''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ${S.showGoals?goalsModalHTML():''}
  </div>`;
}

      </select>
      <div style="flex:1;color:var(--muted);font-size:13px">${fl.length} lead(s) · Receita: <strong style="color:var(--gold)">${fmtR(receita)}</strong></div>
      <button class="btn btn-gold" onclick="downloadCSV()">⬇️ Baixar CSV</button>
      <button class="btn" onclick="downloadJSON()">⬇️ JSON</button>
    </div>
    <div class="rcard"><div style="overflow-x:auto"><table class="rtable">
      <thead><tr><th>Nome</th><th>WhatsApp</th><th>E-mail</th><th>Curso</th><th>Instituição</th><th>Data Formatura</th><th>Qtd.</th><th>Valor</th><th>Etapa</th><th>Responsável</th><th>Cadastrado</th><th>Origem</th><th>Motivo Perda</th><th>Notas</th></tr></thead>
      <tbody>${fl.length?rows:`<tr><td colspan="13" style="text-align:center;padding:32px;color:var(--muted)">Nenhum lead com esses filtros</td></tr>`}</tbody>
    </table></div></div>
  </div>`;
}

/* ── DOWNLOADS ── */
window.downloadCSV=function(){
  let fl=S.isAdmin?S.leads:S.leads.filter(l=>l.assignedTo===S.user);
  if(S.rptStage!=='all')fl=fl.filter(l=>l.stage===S.rptStage);
  if(S.isAdmin&&S.rptSeller!=='all')fl=fl.filter(l=>l.assignedTo===S.rptSeller);
  if(S.rptOrigin!=='all')fl=fl.filter(l=>l.origem===S.rptOrigin);
  if(!fl.length){toast('Nenhum lead para exportar',true);return}
  const esc=v=>`"${String(v||'').replace(/"/g,'""')}"`;
  const hdr=['Nome','WhatsApp','E-mail','Curso','Instituição','Data Formatura','Qtd. Alunos','Valor (R$)','Origem','Etapa','Responsável','Cadastrado em','Motivo Perda','Notas'].join(';');
  const rows=fl.map(l=>{
    const cr=isoOf(l.createdAt)?new Date(isoOf(l.createdAt)).toLocaleDateString('pt-BR'):'';
    const notas=(l.notes||[]).map(n=>`[${n.author}] ${n.text}`).join(' | ');
    const orig=l.origem?(ORIGENS.find(o=>o.id===l.origem)?.label||l.origem):'';return[l.name,l.phone,l.email,l.course,l.institution,fmtD(l.eventDate),l.quantity,l.value,orig,stg(l.stage).label,l.assignedTo,cr,l.lostReason,notas].map(esc).join(';');
  });
  const blob=new Blob(['\uFEFF'+hdr+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`Ideiabh_Leads_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  a.click();toast('📊 CSV baixado!');
}
window.downloadJSON=function(){
  let fl=S.isAdmin?S.leads:S.leads.filter(l=>l.assignedTo===S.user);
  if(S.rptStage!=='all')fl=fl.filter(l=>l.stage===S.rptStage);
  if(S.isAdmin&&S.rptSeller!=='all')fl=fl.filter(l=>l.assignedTo===S.rptSeller);
  if(S.rptOrigin!=='all')fl=fl.filter(l=>l.origem===S.rptOrigin);
  if(!fl.length){toast('Nenhum lead para exportar',true);return}
  const clean=fl.map(l=>({nome:l.name,whatsapp:l.phone,email:l.email,curso:l.course,instituicao:l.institution,dataFormatura:l.eventDate,quantidadeAlunos:l.quantity,valorEstimado:l.value,etapa:stg(l.stage).label,responsavel:l.assignedTo,origem:l.origem?(ORIGENS.find(o=>o.id===l.origem)?.label||l.origem):'',motivoPerda:l.lostReason,notas:(l.notes||[]).map(n=>({autor:n.author,texto:n.text,data:n.date})),cadastradoEm:isoOf(l.createdAt),atualizadoEm:isoOf(l.updatedAt)}));
  const blob=new Blob([JSON.stringify(clean,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`Ideiabh_Leads_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();toast('📋 JSON baixado!');
}

/* ── ACTIONS ── */
window.toggleTheme=function(){S.theme=S.theme==='dark'?'light':'dark';applyTheme();R()}
window.doLogin=function(u){
  const reqPass=S.sellerPasses[u];
  if(reqPass){
    const entered=prompt('\uD83D\uDD12 Senha de '+u+':');
    if(entered===null)return;
    if(entered!==reqPass){alert('\u274C Senha incorreta!');return;}
  }
  S.user=u;S.isAdmin=false;
  const pend=S.tasks.filter(t=>t.assignedTo===u&&t.status!=='done');
  if(pend.length){S.showNotif=true;}
  R();
}
window.doAdminLogin=function(){
  const p=prompt(`Senha do ${S.adminName}:`);if(p===null)return;
  if(p===S.adminPass){
    S.user=S.adminName;S.isAdmin=true;
    const pend=myPendingTasks();if(pend.length)S.showNotif=true;
    R();
  }else alert('❌ Senha incorreta!');
}
window.doLogout=function(){S.user=null;S.isAdmin=false;S.sid=null;S.showNotif=false;R()}
window.setView=function(v){S.view=v;R()}
window.setFilter=function(v){S.filter=v;R()}
window.openAdd=function(){S.showAdd=true;R()}
window.closeAdd=function(){S.showAdd=false;R()}
window.openSet=function(){S.showSet=true;R()}
window.closeSet=function(){S.showSet=false;R()}

window.closeLead=function(){S.sid=null;S.edit=false;R()}

window.moveLead=async function(id,stageId){
  try{
    const l=lead(id);
    const hist=[...(l.stageHistory||[]),{from:l.stage,to:stageId,by:S.user,at:new Date().toISOString()}];
    await updateDoc(doc(db,'leads',id),{stage:stageId,stageHistory:hist,updatedAt:new Date().toISOString()});
    toast(`Movido para ${stg(stageId).label}`);
    if(l.phone&&S.sid===id){S.waModalLead=id;S.waModalStage=stageId;S.showWaModal=true;R();}
  }catch(e){toast('Erro ao mover',true)}
}
window.delLead=async function(id){
  try{await deleteDoc(doc(db,'leads',id));S.sid=null;toast('Lead excluído');}
  catch(e){toast('Erro ao excluir',true)}
}
window.addNote=async function(lid){
  const el=document.getElementById('ni');if(!el||!el.value.trim())return;
  const l=lead(lid);if(!l)return;
  const notes=[...(l.notes||[]),{text:el.value.trim(),author:S.user,date:new Date().toISOString()}];
  el.value='';try{await updateDoc(doc(db,'leads',lid),{notes,updatedAt:new Date().toISOString()});toast('Nota adicionada ✅');}
  catch(e){toast('Erro',true)}
}
window.saveLead=async function(id){
  const g=k=>{const el=document.getElementById('lf-'+k);return el?el.value:''};
  try{await updateDoc(doc(db,'leads',id),{name:g('name'),phone:g('phone'),email:g('email'),course:g('course'),institution:g('institution'),eventDate:g('eventDate'),quantity:g('quantity'),value:g('value'),origem:g('origem'),assignedTo:g('assignedTo'),lostReason:g('lostReason'),updatedAt:new Date().toISOString()});
    S.edit=false;toast('Lead salvo ✅');}catch(e){toast('Erro ao salvar',true)}

window.submitAdd=async function(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():''};
  const name=g('af-name'),phone=g('af-phone');
  if(!name||!phone){alert('⚠️ Nome e WhatsApp são obrigatórios!');return}
  const obs=g('af-obs');
  try{await addDoc(collection(db,'leads'),{name,phone,email:g('af-email'),course:g('af-course'),institution:g('af-inst'),eventDate:g('af-date'),quantity:g('af-qty'),value:g('af-val'),assignedTo:g('af-seller')||S.user,origem:g('af-origem'),stage:'lead',lostReason:'',notes:obs?[{text:obs,author:S.user,date:new Date().toISOString()}]:[],createdAt:serverTimestamp(),updatedAt:new Date().toISOString()});
    S.showAdd=false;toast('Lead criado ✅');}catch(e){toast('Erro ao criar lead',true);console.log(e)}
}
window.saveSellers=async function(){
  const ns=S.sellers.map((_,i)=>{const el=document.getElementById(`sf-${i}`);return el?el.value.trim()||S.sellers[i]:S.sellers[i]});
  const newPasses={};
  S.sellers.forEach((old,i)=>{
    const newName=ns[i];
    const pel=document.getElementById(`sfp-${i}`);
    const pval=pel?pel.value.trim():'';
    if(pval)newPasses[newName]=pval;
    else if(!pval&&S.sellerPasses[old])newPasses[newName]=S.sellerPasses[old];
  });
  S.sellers.forEach((old,i)=>{
    if(old!==ns[i]){
      S.leads=S.leads.map(l=>l.assignedTo===old?{...l,assignedTo:ns[i]}:l);
      S.tasks=S.tasks.map(t=>t.assignedTo===old?{...t,assignedTo:ns[i]}:t);
      if(S.user===old)S.user=ns[i];
    }
  });
  S.sellers=ns;S.sellerPasses=newPasses;
  const an=document.getElementById('sf-aname'),ap=document.getElementById('sf-apass');
  if(an&&an.value.trim()){if(S.isAdmin&&S.user===S.adminName)S.user=an.value.trim();S.adminName=an.value.trim();}
  if(ap&&ap.value.trim())S.adminPass=ap.value.trim();
  STAGES.forEach(st=>{const el=document.getElementById('wt-'+st.id);if(el)S.waTemplates[st.id]=el.value;});
  const qrEl=document.getElementById('wt-qr');if(qrEl)S.quickReplies=qrEl.value.split('\n').map(s=>s.trim()).filter(Boolean);
  try{await saveConfig();toast('Configurações salvas ✅');}catch(e){toast('Erro',true)}
  S.showSet=false;R();
}

/* ── TASK ACTIONS ── */

window.enviarResumoDia=function(){
  const hoje=new Date().toISOString().slice(0,10);
  const minhasTarefas=S.tasks.filter(t=>t.assignedTo===S.user&&t.status!=='done');
  const atrasadas=minhasTarefas.filter(t=>isOverdue(t));
  const venceHoje=minhasTarefas.filter(t=>t.dueDate===hoje&&!isOverdue(t));
  const proximas=minhasTarefas.filter(t=>t.dueDate&&t.dueDate>hoje);
  const meusLeads=S.leads.filter(l=>l.assignedTo===S.user&&!['fechado','perdido'].includes(l.stage));

  let msg=`🎓 *Ideiabh Convites — Resumo do Dia*\n`;
  msg+=`📅 ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}\n`;
  msg+=`👤 ${S.user}\n\n`;

  if(atrasadas.length){
    msg+=`⚠️ *TAREFAS ATRASADAS (${atrasadas.length})*\n`;
    atrasadas.forEach(t=>{
      const tt=ttype(t.type),l=lead(t.leadId);
      msg+=`• ${tt.icon} ${tt.label}${l?' — '+l.name:''}${t.notes?' ('+t.notes+')':''}\n`;
      msg+=`  📅 Venceu em ${fmtD(t.dueDate)}\n`;
    });
    msg+=`\n`;
  }

  if(venceHoje.length){
    msg+=`⏰ *TAREFAS PARA HOJE (${venceHoje.length})*\n`;
    venceHoje.forEach(t=>{
      const tt=ttype(t.type),l=lead(t.leadId);
      msg+=`• ${tt.icon} ${tt.label}${l?' — '+l.name:''}${t.notes?' ('+t.notes+')':''}\n`;
    });
    msg+=`\n`;
  }

  if(proximas.length){
    msg+=`📋 *PRÓXIMAS TAREFAS (${proximas.length})*\n`;
    proximas.slice(0,5).forEach(t=>{
      const tt=ttype(t.type),l=lead(t.leadId);
      const d=daysUntil(t.dueDate);
      msg+=`• ${tt.icon} ${tt.label}${l?' — '+l.name:''} — ${d}d\n`;
    });
    msg+=`\n`;
  }

  if(!atrasadas.length&&!venceHoje.length){
    msg+=`✅ *Nenhuma tarefa urgente hoje!*\n\n`;
  }

  msg+=`📊 *PIPELINE (${meusLeads.length} leads ativos)*\n`;
  const porEtapa={};
  meusLeads.forEach(l=>{const s=stg(l.stage);porEtapa[s.label]=(porEtapa[s.label]||0)+1;});
  Object.entries(porEtapa).forEach(([et,qt])=>msg+=`• ${et}: ${qt}\n`);

  msg+=`\n💪 Bora vender! 🎓`;

  const phone=prompt('Digite seu WhatsApp com DDD:\nEx: 31999998888');
  if(!phone||!phone.trim())return;
  const n=phone.replace(/\D/g,'');
  const num=n.startsWith('55')?n:'55'+n;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
}

window.updateTaskSeller=function(leadId){
  const l=S.leads.find(x=>x.id===leadId);
  const el=document.getElementById('tf-seller');
  if(!el)return;
  if(l&&l.assignedTo){
    el.outerHTML=`<input id="tf-seller" value="${l.assignedTo}" readonly style="background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-family:Nunito,sans-serif;font-size:14px;width:100%;opacity:.7;cursor:not-allowed">`;
  } else {
    const sOpts=S.sellers.map(s=>`<option value="${s}" ${S.user===s?'selected':''}>${s}</option>`).join('');
    el.outerHTML=`<select id="tf-seller" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-family:Nunito,sans-serif;font-size:14px;width:100%">${sOpts}</select>`;

window.submitTask=async function(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():''};
  try{
    const recCb=document.getElementById('tf-recurring');
    const recDays=document.getElementById('tf-recdays');
    const isRec=recCb&&recCb.checked;
    await addDoc(collection(db,'tasks'),{
      type:g('tf-type'),leadId:g('tf-lead')||null,assignedTo:g('tf-seller'),
      dueDate:g('tf-date'),notes:g('tf-notes'),status:'pending',
      recurring:isRec,recurringDays:isRec&&recDays?parseInt(recDays.value)||5:null,
      createdBy:S.user,createdAt:serverTimestamp()
    });
    S.showTaskModal=false;S.taskLid=null;S.edit=false;toast('Tarefa criada ✅');
  }catch(e){toast('Erro ao criar tarefa',true);console.log(e)}
}
window.doneTask=async function(id){
  try{
    const t=S.tasks.find(x=>x.id===id);
    await updateDoc(doc(db,'tasks',id),{status:'done',doneAt:new Date().toISOString(),doneBy:S.user});
    if(t&&t.recurring&&t.recurringDays){
      const next=new Date();next.setDate(next.getDate()+t.recurringDays);
      const nd=next.toISOString().slice(0,10);
      await addDoc(collection(db,'tasks'),{
        type:t.type,leadId:t.leadId||null,assignedTo:t.assignedTo,
        dueDate:nd,notes:t.notes||'',status:'pending',
        recurring:true,recurringDays:t.recurringDays,
        createdBy:'sistema',createdAt:serverTimestamp()
      });
      toast(`Tarefa concluída ✅ — próxima criada para ${nd.split('-').reverse().join('/')}`);
    }else{toast('Tarefa concluída ✅');}
  }catch(e){toast('Erro',true)}
}
window.delTask=async function(id){
  if(!confirm('Excluir esta tarefa?'))return;
  try{await deleteDoc(doc(db,'tasks',id));toast('Tarefa excluída');}
  catch(e){toast('Erro',true)}
}
window.saveTask=async function(id){
  const g=k=>{const el=document.getElementById(k);return el?el.value.trim():''};
  try{await updateDoc(doc(db,'tasks',id),{type:g('et-type'),leadId:g('et-lead')||null,assignedTo:g('et-seller'),dueDate:g('et-date'),notes:g('et-notes')});
    S.editTask=null;toast('Tarefa salva ✅');}catch(e){toast('Erro',true)}
}

await loadConfig();
subscribeLeads();
subscribeTasks();
document.getElementById('loading').style.display='none';
R();
