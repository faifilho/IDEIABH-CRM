<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FormaCRM — Convites de Formatura</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-l:#e8c96d;
  --bg:#0d0d1a;--card:#16162a;--card2:#0a0a14;
  --border:#252542;--text:#e2e2f0;--muted:#7070a0;
  --wa:#25d366;--danger:#ef4444;--success:#10b981;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.logo{font-family:'Cinzel',serif;color:var(--gold)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;
  border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold)}
.btn-gold{background:var(--gold);color:#000;border:none}
.btn-gold:hover{background:var(--gold-l)}
.btn-wa{background:#0d2216;color:var(--wa);border:1px solid #1a3d25;font-size:12px;padding:4px 10px}
.btn-wa:hover{border-color:var(--wa);background:#0f2e1c}
.btn-danger{background:#2a0d0d;color:var(--danger);border-color:#3d1414}
.btn-danger:hover{border-color:var(--danger)}
/* FORMS */
input,select,textarea{background:var(--card2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:14px;
  width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:72px}
label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
select option{background:#1a1a2e}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:650px;max-height:92vh;overflow-y:auto;
  box-shadow:0 24px 70px rgba(0,0,0,.65)}
.modal-sm{max-width:430px}
/* HEADER */
#hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.tab{padding:6px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;
  font-weight:700;font-family:'Nunito',sans-serif;transition:all .2s;background:transparent;color:var(--muted)}
.tab.on{background:var(--gold);color:#000}
/* KANBAN */
#kanban{display:flex;gap:14px;padding:20px;overflow-x:auto;min-height:calc(100vh - 67px);align-items:flex-start}
.col{min-width:268px;max-width:268px;display:flex;flex-direction:column}
.col-head{background:var(--card);border:1px solid var(--border);border-bottom:none;
  border-radius:12px 12px 0 0;padding:12px 14px;display:flex;align-items:center;gap:8px}
.col-body{background:#08081280;border:1px solid var(--border);border-top:none;
  border-radius:0 0 12px 12px;flex:1;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:180px}
.card{background:var(--card);border:1px solid var(--border);border-left-width:3px;
  border-radius:10px;padding:13px;cursor:pointer;transition:all .15s}
.card:hover{transform:translateY(-2px);background:#1c1c36;border-color:#3a3a60}
.badge{display:inline-block;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700}
/* DASHBOARD */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:26px}
.kcard{background:var(--card);border:1px solid var(--border);border-top:3px solid;border-radius:12px;padding:18px}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* LOGIN */
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 12px;
  cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:12px;
  color:var(--text);font-size:13px;font-weight:700;text-align:center;border-top-width:3px}
.scard:hover{transform:translateY(-5px)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800}
.sec{color:var(--text);font-size:15px;font-weight:700;margin-bottom:14px}
.info-l{color:var(--muted);font-size:12px;margin-bottom:2px}
.info-v{color:var(--text);font-size:14px;font-weight:600;padding:4px 0}
.nitem{background:var(--card2);border-radius:8px;padding:10px 14px;border:1px solid var(--border)}
hr{border:none;border-top:1px solid var(--border)}
.pill{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;
  transition:all .15s;border:1px solid;font-family:'Nunito',sans-serif}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--muted);font-weight:600;padding:10px 14px;text-align:left;background:var(--card2)}
td{padding:10px 14px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STAGES=[
  {id:'lead',      label:'Novo Lead',     icon:'🎯',color:'#6366f1'},
  {id:'contato',   label:'Em Contato',    icon:'📞',color:'#f59e0b'},
  {id:'proposta',  label:'Proposta',      icon:'📄',color:'#3b82f6'},
  {id:'negociacao',label:'Negociação',    icon:'🤝',color:'#8b5cf6'},
  {id:'fechado',   label:'Fechado',       icon:'🎓',color:'#10b981'},
  {id:'perdido',   label:'Perdido',       icon:'💔',color:'#ef4444'},
];
const AV=['#c9a84c','#6366f1','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#ec4899'];

let S={
  user:null,leads:[],
  sellers:['Ana Silva','Bruno Costa','Carlos Lima','Diana Santos','Eduardo Ramos','Fernanda Souza','Gabriel Alves','Helena Martins'],
  view:'kanban',sid:null,showAdd:false,showSet:false,filter:'all',edit:false
};

/* ── STORAGE ── */
function persist(){
  try{localStorage.setItem('fcrm-l',JSON.stringify(S.leads));localStorage.setItem('fcrm-s',JSON.stringify(S.sellers));}catch(e){}
}
function restore(){
  try{
    const l=localStorage.getItem('fcrm-l'),s=localStorage.getItem('fcrm-s');
    if(l)S.leads=JSON.parse(l);if(s)S.sellers=JSON.parse(s);
  }catch(e){}
}

/* ── UTILS ── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fmtR(v){if(!v&&v!==0)return'—';return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(d){if(!d)return'—';const[y,m,dy]=d.split('-');return`${dy}/${m}/${y}`}
function ago(iso){const d=Math.floor((Date.now()-new Date(iso))/86400000);return d===0?'hoje':d===1?'ontem':`${d}d atrás`}
function wlink(ph,nm){
  if(!ph)return'#';
  const c=ph.replace(/\D/g,'');const n=c.startsWith('55')?c:'55'+c;
  const m=encodeURIComponent(`Olá ${nm}! 😊 Somos especializados em convites de formatura de alta qualidade. Posso te apresentar nossos modelos e condições?`);
  return`https://wa.me/${n}?text=${m}`
}
function stg(id){return STAGES.find(s=>s.id===id)||STAGES[0]}
function lead(id){return S.leads.find(l=>l.id===id)}
function avcolor(seller){const i=S.sellers.indexOf(seller);return AV[i>=0?i%8:0]}

/* ── RENDER ── */
function R(){
  document.getElementById('app').innerHTML=!S.user?loginHTML():appHTML();
}

/* ── LOGIN ── */
function loginHTML(){
  const cards=S.sellers.map((s,i)=>`
    <button class="scard" onclick="doLogin('${s.replace(/'/g,"\\'")}')" style="border-top-color:${AV[i%8]}">
      <div class="av" style="width:52px;height:52px;font-size:20px;background:${AV[i%8]}22;border:2px solid ${AV[i%8]};color:${AV[i%8]}">${s.charAt(0)}</div>
      <span>${s}</span>
    </button>`).join('');
  return`
    <div id="login">
      <div style="text-align:center;margin-bottom:42px">
        <div class="logo" style="font-size:42px;margin-bottom:8px">🎓 FormaCRM</div>
        <div style="color:var(--muted);font-size:12px;letter-spacing:4px;text-transform:uppercase">Gráfica de Convites de Formatura</div>
      </div>
      <div style="color:var(--text);font-size:18px;font-weight:700;text-align:center;margin-bottom:22px">Quem está acessando?</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:580px;width:100%">${cards}</div>
    </div>`;
}

/* ── FULL APP ── */
function appHTML(){
  const u=S.user,color=avcolor(u);
  const fOpts=S.sellers.map(s=>`<option value="${s}" ${S.filter===s?'selected':''}>${s}</option>`).join('');
  const hdr=`
    <div id="hdr">
      <div class="logo" style="font-size:20px;white-space:nowrap">🎓 FormaCRM</div>
      <div style="display:flex;gap:4px">
        <button class="tab ${S.view==='kanban'?'on':''}" onclick="setView('kanban')">📋 Kanban</button>
        <button class="tab ${S.view==='dashboard'?'on':''}" onclick="setView('dashboard')">📊 Dashboard</button>
      </div>
      <select style="max-width:185px;flex-shrink:0" onchange="setFilter(this.value)">
        <option value="all" ${S.filter==='all'?'selected':''}>Todos os vendedores</option>
        ${fOpts}
      </select>
      <button class="btn btn-gold" onclick="openAdd()" style="margin-left:auto">+ Novo Lead</button>
      <button class="btn" onclick="openSet()" title="Configurações" style="padding:7px 12px">⚙️</button>
      <div style="display:flex;align-items:center;gap:8px;border-left:1px solid var(--border);padding-left:14px;flex-shrink:0">
        <div class="av" style="width:34px;height:34px;font-size:14px;background:${color}22;border:2px solid ${color};color:${color}">${u.charAt(0)}</div>
        <div>
          <div style="font-size:13px;font-weight:700;line-height:1.2">${u}</div>
          <button onclick="doLogout()" style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:0;font-family:Nunito,sans-serif">Sair</button>
        </div>
      </div>
    </div>`;
  const main=S.view==='kanban'?kanbanHTML():dashHTML();
  const mod=S.sid?leadModalHTML():'';
  const add=S.showAdd?addModalHTML():'';
  const set=S.showSet?setModalHTML():'';
  return hdr+`<div id="mc">${main}</div>`+mod+add+set;
}

/* ── KANBAN ── */
function kanbanHTML(){
  const fl=S.filter==='all'?S.leads:S.leads.filter(l=>l.assignedTo===S.filter);
  const cols=STAGES.map(st=>{
    const ls=fl.filter(l=>l.stage===st.id);
    const cards=ls.length?ls.map(l=>cardHTML(l,st)).join('')
      :`<div style="color:var(--muted);text-align:center;padding:28px 0;font-size:12px;opacity:.5">Nenhum lead aqui</div>`;
    return`
      <div class="col">
        <div class="col-head" style="border-top:3px solid ${st.color}">
          <span style="font-size:17px">${st.icon}</span>
          <span style="font-weight:700;font-size:13px;flex:1">${st.label}</span>
          <span class="badge" style="background:${st.color}22;color:${st.color}">${ls.length}</span>
        </div>
        <div class="col-body">${cards}</div>
      </div>`;
  }).join('');
  return`<div id="kanban">${cols}</div>`;
}

function cardHTML(l,st){
  const waBtn=l.phone?`<a href="${wlink(l.phone,l.name)}" target="_blank" onclick="event.stopPropagation()" class="btn btn-wa">📱 WA</a>`:'';
  return`
    <div class="card" onclick="openLead('${l.id}')" style="border-left-color:${st.color}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:6px">
        <div style="font-weight:700;font-size:14px;line-height:1.3">${l.name}</div>
        ${waBtn}
      </div>
      ${l.course?`<div style="color:var(--muted);font-size:12px;line-height:1.6">🎓 ${l.course}</div>`:''}
      ${l.institution?`<div style="color:var(--muted);font-size:12px;line-height:1.6">🏫 ${l.institution}</div>`:''}
      ${l.eventDate?`<div style="color:var(--muted);font-size:12px;line-height:1.6">📅 ${fmtD(l.eventDate)}</div>`:''}
      ${l.value?`<div style="color:var(--gold);font-weight:700;font-size:13px;margin-top:6px">${fmtR(l.value)}</div>`:''}
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <div style="color:var(--muted);font-size:11px">${(l.assignedTo||'').split(' ')[0]}</div>
        <div style="color:var(--muted);font-size:11px">${ago(l.createdAt)}</div>
      </div>
    </div>`;
}

/* ── LEAD MODAL ── */
function leadModalHTML(){
  const l=lead(S.sid);if(!l)return'';
  const st=stg(l.stage),e=S.edit;
  const sOpts=S.sellers.map(s=>`<option value="${s}" ${l.assignedTo===s?'selected':''}>${s}</option>`).join('');
  const pills=STAGES.map(s=>`
    <button class="pill" onclick="moveLead('${l.id}','${s.id}')"
      style="background:${l.stage===s.id?s.color+'33':'transparent'};color:${l.stage===s.id?s.color:'var(--muted)'};border-color:${l.stage===s.id?s.color:'var(--border)'}">
      ${s.icon} ${s.label}
    </button>`).join('');
  const notes=(l.notes||[]).slice().reverse().map(n=>`
    <div class="nitem">
      <div style="font-size:13px">${n.text}</div>
      <div style="color:var(--muted);font-size:11px;margin-top:4px">${n.author} · ${new Date(n.date).toLocaleString('pt-BR')}</div>
    </div>`).join('')||`<div style="color:var(--muted);font-size:13px;text-align:center;padding:14px">Nenhuma nota ainda</div>`;
  const f=(lbl,id,val,type='text',ph='')=>e
    ?`<div><label>${lbl}</label><input type="${type}" id="lf-${id}" value="${val||''}" placeholder="${ph}"></div>`
    :`<div><div class="info-l">${lbl}</div><div class="info-v">${type==='date'?fmtD(val):id==='value'?fmtR(val):id==='quantity'?((val||'')+' ').trim()+'unid.':'  '===val?'—':(val||'—')}</div></div>`;
  return`
    <div class="overlay" onclick="if(event.target===this)closeLead()">
      <div class="modal">
        <div style="padding:20px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px">
          <div style="flex:1">
            <span class="badge" style="background:${st.color}22;color:${st.color};margin-bottom:6px">${st.icon} ${st.label}</span>
            ${e?`<br><input id="lf-name" value="${l.name}" style="font-size:18px;font-weight:800;margin-top:6px">`
               :`<div style="font-size:20px;font-weight:800">${l.name}</div>`}
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0">
            ${l.phone?`<a href="${wlink(l.phone,l.name)}" target="_blank" class="btn btn-wa" style="font-size:13px;padding:7px 14px">📱 WhatsApp</a>`:''}
            ${!e?`<button class="btn" onclick="S.edit=true;R()">✏️ Editar</button>`
                :`<button class="btn btn-gold" onclick="saveLead('${l.id}')">💾 Salvar</button>
                  <button class="btn" onclick="S.edit=false;R()">✕</button>`}
            <button class="btn" onclick="closeLead()" style="padding:7px 12px">✕</button>
          </div>
        </div>
        <div style="padding:12px 22px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap">${pills}</div>
        <div style="padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px">
          ${f('Telefone / WhatsApp','phone',l.phone,'tel','(00) 00000-0000')}
          ${f('E-mail','email',l.email,'email','email@exemplo.com')}
          ${f('Curso','course',l.course,'text','Medicina, Direito...')}
          ${f('Instituição','institution',l.institution,'text','Universidade...')}
          ${f('Data da Formatura','eventDate',l.eventDate,'date','')}
          ${f('Qtd. de Convites','quantity',l.quantity,'number','100')}
          ${f('Valor Estimado (R$)','value',l.value,'number','0')}
          <div>${e?`<label>Responsável</label><select id="lf-assignedTo">${sOpts}</select>`
                  :`<div class="info-l">Responsável</div><div class="info-v">${l.assignedTo||'—'}</div>`}</div>
        </div>
        ${e?`<div style="padding:0 22px 20px"><label>Motivo de Perda (se aplicável)</label>
               <input id="lf-lostReason" value="${l.lostReason||''}" placeholder="Por que perdemos esse lead?"></div>`
            :(l.lostReason?`<div style="padding:0 22px 20px"><div class="info-l">Motivo da Perda</div><div class="info-v" style="color:var(--danger)">${l.lostReason}</div></div>`:'')}
        <hr>
        <div style="padding:20px 22px">
          <div class="sec">📝 Notas e Histórico</div>
          <div style="display:flex;gap:8px;margin-bottom:12px">
            <input id="ni" placeholder="Adicionar nota... (Enter para salvar)" onkeydown="if(event.key==='Enter')addNote('${l.id}')" style="flex:1">
            <button class="btn btn-gold" onclick="addNote('${l.id}')">Adicionar</button>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;max-height:210px;overflow-y:auto">${notes}</div>
        </div>
        <div style="padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <div style="color:var(--muted);font-size:12px">Criado em ${new Date(l.createdAt).toLocaleDateString('pt-BR')} · Atualizado ${ago(l.updatedAt)}</div>
          <button class="btn btn-danger" onclick="if(confirm('Excluir este lead?'))delLead('${l.id}')">🗑️ Excluir</button>
        </div>
      </div>
    </div>`;
}

/* ── ADD MODAL ── */
function addModalHTML(){
  const sOpts=S.sellers.map(s=>`<option value="${s}" ${S.user===s?'selected':''}>${s}</option>`).join('');
  return`
    <div class="overlay" onclick="if(event.target===this)closeAdd()">
      <div class="modal">
        <div style="padding:20px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <div class="logo" style="font-size:18px">🎯 Novo Lead</div>
          <button class="btn" onclick="closeAdd()" style="padding:6px 12px">✕</button>
        </div>
        <div style="padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div style="grid-column:1/-1"><label>Nome do Contato *</label><input id="af-name" placeholder="Nome completo" autofocus></div>
          <div><label>WhatsApp *</label><input id="af-phone" placeholder="(00) 00000-0000" type="tel"></div>
          <div><label>E-mail</label><input id="af-email" placeholder="email@exemplo.com" type="email"></div>
          <div><label>Curso</label><input id="af-course" placeholder="Medicina, Direito, Engenharia..."></div>
          <div><label>Instituição</label><input id="af-inst" placeholder="Universidade / Faculdade"></div>
          <div><label>Data da Formatura</label><input id="af-date" type="date"></div>
          <div><label>Qtd. de Convites (estimado)</label><input id="af-qty" type="number" placeholder="100" min="1"></div>
          <div><label>Valor Estimado (R$)</label><input id="af-val" type="number" placeholder="0,00" min="0"></div>
          <div><label>Responsável</label><select id="af-seller">${sOpts}</select></div>
          <div style="grid-column:1/-1"><label>Observações iniciais</label><textarea id="af-obs" placeholder="Alguma informação importante..."></textarea></div>
        </div>
        <div style="padding:0 22px 22px;display:flex;gap:8px;justify-content:flex-end">
          <button class="btn" onclick="closeAdd()">Cancelar</button>
          <button class="btn btn-gold" onclick="submitAdd()">✅ Criar Lead</button>
        </div>
      </div>
    </div>`;
}

/* ── SETTINGS MODAL ── */
function setModalHTML(){
  const inputs=S.sellers.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:8px">
      <div class="av" style="width:32px;height:32px;min-width:32px;font-size:13px;background:${AV[i%8]}22;border:2px solid ${AV[i%8]};color:${AV[i%8]}">${s.charAt(0)}</div>
      <input id="sf-${i}" value="${s}">
    </div>`).join('');
  return`
    <div class="overlay" onclick="if(event.target===this)closeSet()">
      <div class="modal modal-sm">
        <div style="padding:20px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:16px;font-weight:700">⚙️ Configurações</div>
          <button class="btn" onclick="closeSet()" style="padding:6px 12px">✕</button>
        </div>
        <div style="padding:20px 22px">
          <div class="sec">Nome dos Vendedores</div>
          <div style="display:flex;flex-direction:column;gap:10px">${inputs}</div>
          <div style="margin-top:20px;padding:14px;background:var(--card2);border-radius:10px;border:1px solid var(--border)">
            <div style="color:var(--muted);font-size:12px;line-height:1.6">
              💡 Altere os nomes dos vendedores conforme necessário. Os leads atribuídos serão atualizados automaticamente.
            </div>
          </div>
        </div>
        <div style="padding:0 22px 22px;display:flex;gap:8px;justify-content:flex-end">
          <button class="btn" onclick="closeSet()">Cancelar</button>
          <button class="btn btn-gold" onclick="saveSellers()">💾 Salvar Nomes</button>
        </div>
      </div>
    </div>`;
}

/* ── DASHBOARD ── */
function dashHTML(){
  const ls=S.leads,fch=ls.filter(l=>l.stage==='fechado'),prd=ls.filter(l=>l.stage==='perdido');
  const pip=ls.filter(l=>!['fechado','perdido'].includes(l.stage));
  const rev=fch.reduce((s,l)=>s+(Number(l.value)||0),0);
  const pot=pip.reduce((s,l)=>s+(Number(l.value)||0),0);
  const conv=ls.length?((fch.length/ls.length)*100).toFixed(1):'0.0';
  const kpis=[
    {icon:'🎯',lbl:'Total de Leads',v:ls.length,c:'#6366f1'},
    {icon:'⚡',lbl:'Em Pipeline',v:pip.length,c:'#f59e0b'},
    {icon:'🎓',lbl:'Fechados',v:fch.length,c:'#10b981'},
    {icon:'💔',lbl:'Perdidos',v:prd.length,c:'#ef4444'},
    {icon:'📈',lbl:'Taxa de Conversão',v:conv+'%',c:'#c9a84c'},
    {icon:'💰',lbl:'Receita Fechada',v:fmtR(rev),c:'#10b981'},
    {icon:'🚀',lbl:'Potencial em Pipeline',v:fmtR(pot),c:'#3b82f6'},
  ].map(k=>`<div class="kcard" style="border-top-color:${k.c}">
    <div style="font-size:22px;margin-bottom:8px">${k.icon}</div>
    <div style="color:${k.c};font-size:22px;font-weight:800">${k.v}</div>
    <div style="color:var(--muted);font-size:12px;margin-top:4px">${k.lbl}</div>
  </div>`).join('');
  const rows=S.sellers.map((sel,i)=>{
    const sl=ls.filter(l=>l.assignedTo===sel),sf=sl.filter(l=>l.stage==='fechado');
    const sp=sl.filter(l=>!['fechado','perdido'].includes(l.stage));
    const rv=sf.reduce((s,l)=>s+(Number(l.value)||0),0);
    const c=sl.length?((sf.length/sl.length)*100).toFixed(0):'0';
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="av" style="width:28px;height:28px;min-width:28px;font-size:12px;background:${AV[i%8]}22;border:1px solid ${AV[i%8]};color:${AV[i%8]}">${sel.charAt(0)}</div>
        <span style="font-weight:700">${sel}</span></div></td>
      <td style="text-align:center">${sl.length}</td>
      <td style="text-align:center;color:#f59e0b">${sp.length}</td>
      <td style="text-align:center;color:#10b981">${sf.length}</td>
      <td style="text-align:center;color:var(--gold)">${c}%</td>
      <td style="text-align:right;color:var(--gold);font-weight:700">${rv>0?fmtR(rv):'—'}</td>
    </tr>`;
  }).join('');
  return`
    <div style="padding:24px;max-width:1200px;margin:0 auto">
      <div class="logo" style="font-size:22px;margin-bottom:24px">📊 Dashboard</div>
      <div class="kgrid">${kpis}</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border)"><div class="sec" style="margin:0">Performance por Vendedor</div></div>
        <div style="overflow-x:auto">
          <table><thead><tr>
            <th>Vendedor</th><th style="text-align:center">Total</th>
            <th style="text-align:center">Pipeline</th><th style="text-align:center">Fechados</th>
            <th style="text-align:center">Conversão</th><th style="text-align:right">Receita</th>
          </tr></thead><tbody>${rows}</tbody></table>
        </div>
      </div>
    </div>`;
}

/* ── ACTIONS ── */
function doLogin(u){S.user=u;S.view='kanban';R()}
function doLogout(){S.user=null;S.sid=null;R()}
function setView(v){S.view=v;R()}
function setFilter(v){S.filter=v;R()}
function openAdd(){S.showAdd=true;R()}
function closeAdd(){S.showAdd=false;R()}
function openSet(){S.showSet=true;R()}
function closeSet(){S.showSet=false;R()}
function openLead(id){S.sid=id;S.edit=false;R()}
function closeLead(){S.sid=null;S.edit=false;R()}

function moveLead(id,stageId){
  S.leads=S.leads.map(l=>l.id===id?{...l,stage:stageId,updatedAt:new Date().toISOString()}:l);
  persist();R();
}

function delLead(id){
  S.leads=S.leads.filter(l=>l.id!==id);S.sid=null;persist();R();
}

function addNote(lid){
  const el=document.getElementById('ni');if(!el||!el.value.trim())return;
  const n={text:el.value.trim(),author:S.user,date:new Date().toISOString()};
  S.leads=S.leads.map(l=>l.id===lid?{...l,notes:[...(l.notes||[]),n],updatedAt:new Date().toISOString()}:l);
  persist();R();
}

function saveLead(id){
  const g=k=>{const el=document.getElementById('lf-'+k);return el?el.value:''};
  S.leads=S.leads.map(l=>l.id===id?{...l,
    name:g('name')||l.name,phone:g('phone'),email:g('email'),
    course:g('course'),institution:g('institution'),eventDate:g('eventDate'),
    quantity:g('quantity'),value:g('value'),
    assignedTo:g('assignedTo')||l.assignedTo,lostReason:g('lostReason'),
    updatedAt:new Date().toISOString()
  }:l);
  S.edit=false;persist();R();
}

function submitAdd(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():''};
  const name=g('af-name'),phone=g('af-phone');
  if(!name||!phone){alert('⚠️ Nome e WhatsApp são obrigatórios!');return}
  const obs=g('af-obs');
  const newLead={
    id:uid(),name,phone,email:g('af-email'),course:g('af-course'),
    institution:g('af-inst'),eventDate:g('af-date'),quantity:g('af-qty'),
    value:g('af-val'),assignedTo:g('af-seller')||S.user,
    stage:'lead',lostReason:'',
    notes:obs?[{text:obs,author:S.user,date:new Date().toISOString()}]:[],
    createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()
  };
  S.leads.push(newLead);S.showAdd=false;persist();R();
}

function saveSellers(){
  const ns=S.sellers.map((_,i)=>{const el=document.getElementById(`sf-${i}`);return el?el.value.trim()||S.sellers[i]:S.sellers[i]});
  S.sellers.forEach((old,i)=>{
    if(old!==ns[i]){
      S.leads=S.leads.map(l=>l.assignedTo===old?{...l,assignedTo:ns[i]}:l);
      if(S.user===old)S.user=ns[i];
    }
  });
  S.sellers=ns;S.showSet=false;persist();R();
}

/* ── INIT ── */
restore();R();
</script>
</body>
</html>
